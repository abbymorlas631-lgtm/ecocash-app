<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>EcoCash Zimbabwe</title>

  <link rel="stylesheet" href="style.css">

  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

<div class="phone">

  <!-- HEADER -->
  <div class="header">

    <div>
      <h2>EcoCash</h2>
      <p>Welcome Back</p>
    </div>

    <i class="fa-solid fa-bell"></i>

  </div>

  <!-- BALANCE -->
  <div class="balance-card">

    <p>Total Balance</p>

    <h1>USD 1,240.00</h1>

    <small>Available Balance</small>

  </div>

  <!-- ACTION BUTTONS -->
  <div class="actions">

    <div class="action">
      <i class="fa-solid fa-paper-plane"></i>
      <span>Send Money</span>
    </div>

    <div class="action">
      <i class="fa-solid fa-wallet"></i>
      <span>Cash In</span>
    </div>

    <div class="action">
      <i class="fa-solid fa-money-bill-wave"></i>
      <span>Cash Out</span>
    </div>

    <div class="action">
      <i class="fa-solid fa-mobile-screen"></i>
      <span>Airtime</span>
    </div>

  </div>

  <!-- TRANSACTIONS -->
  <div class="transactions">

    <div class="title">
      <h3>Recent Transactions</h3>
    </div>

    <div class="transaction">

      <div class="left">

        <div class="icon green-bg">
          <i class="fa-solid fa-arrow-up"></i>
        </div>

        <div>
          <h4>Money Sent</h4>
          <p>Tendai Moyo</p>
        </div>

      </div>

      <span class="red">-USD 20</span>

    </div>

    <div class="transaction">

      <div class="left">

        <div class="icon blue-bg">
          <i class="fa-solid fa-arrow-down"></i>
        </div>

        <div>
          <h4>Cash Deposit</h4>
          <p>EcoCash Agent</p>
        </div>

      </div>

      <span class="green">+USD 150</span>

    </div>

    <div class="transaction">

      <div class="left">

        <div class="icon orange-bg">
          <i class="fa-solid fa-bolt"></i>
        </div>

        <div>
          <h4>ZESA Tokens</h4>
          <p>Electricity Payment</p>
        </div>

      </div>

      <span class="red">-USD 35</span>

    </div>

  </div>

  <!-- BOTTOM NAV -->
  <div class="bottom-nav">

    <div class="nav-item active">
      <i class="fa-solid fa-house"></i>
      <span>Home</span>
    </div>

    <div class="nav-item">
      <i class="fa-solid fa-chart-simple"></i>
      <span>Activity</span>
    </div>

    <div class="nav-item">
      <i class="fa-solid fa-user"></i>
      <span>Profile</span>
    </div>

  </div>

</div>

<script src="script.js"></script>

</body>
</html>
